services:
  postgres:
    image: postgres:15
    container_name: refecard-db
    restart: always
    environment:
      POSTGRES_DB: refecard-db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: